name: Deploy Group D to AWS

on:
  push:
    branches:
      - Group-D-feature/AWS-Deployment-Abhishek
    paths:
      - ".github/workflows/aws-deployment*.yml"
      - "aws/**"
      - "project-root/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: group-d-aws-production
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1
  AWS_STACK_NAME: trustshare-group-d-aws

jobs:
  deploy:
    name: Build and deploy
    if: >-
      github.ref == 'refs/heads/Group-D-feature/AWS-Deployment-Abhishek' ||
      github.ref == 'refs/heads/main-group-D'
    runs-on: ubuntu-latest
    steps:
      - name: Check deployment configuration
        shell: bash
        env:
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
        run: |
          if [ -z "$AWS_ROLE_ARN" ]; then
            echo "Repository variable AWS_ROLE_ARN is not configured."
            exit 1
          fi

      - uses: actions/checkout@v6

      - name: Configure temporary AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: TrustShareGitHubDeployment

      - name: Read stack outputs
        id: stack
        shell: bash
        run: |
          output() {
            aws cloudformation describe-stacks \
              --stack-name "$AWS_STACK_NAME" \
              --query "Stacks[0].Outputs[?OutputKey=='$1'].OutputValue" \
              --output text
          }

          echo "repository=$(output EcrRepositoryUri)" >> "$GITHUB_OUTPUT"
          echo "cluster=$(output EcsClusterName)" >> "$GITHUB_OUTPUT"
          echo "service=$(output EcsServiceName)" >> "$GITHUB_OUTPUT"
          echo "application_url=$(output ApplicationUrl)" >> "$GITHUB_OUTPUT"

      - name: Sign in to Amazon ECR
        shell: bash
        env:
          ECR_REPOSITORY: ${{ steps.stack.outputs.repository }}
        run: |
          ECR_REGISTRY="${ECR_REPOSITORY%%/*}"
          aws ecr get-login-password --region "$AWS_REGION" |
            docker login --username AWS --password-stdin "$ECR_REGISTRY"

      - name: Build application image
        shell: bash
        env:
          ECR_REPOSITORY: ${{ steps.stack.outputs.repository }}
        run: |
          docker build \
            --tag "$ECR_REPOSITORY:${GITHUB_SHA}" \
            --tag "$ECR_REPOSITORY:latest" \
            project-root

      - name: Push application image
        shell: bash
        env:
          ECR_REPOSITORY: ${{ steps.stack.outputs.repository }}
        run: |
          docker push "$ECR_REPOSITORY:${GITHUB_SHA}"
          docker push "$ECR_REPOSITORY:latest"

      - name: Deploy image to ECS
        shell: bash
        env:
          ECS_CLUSTER: ${{ steps.stack.outputs.cluster }}
          ECS_SERVICE: ${{ steps.stack.outputs.service }}
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --desired-count 1 \
            --force-new-deployment >/dev/null

          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"

      - name: Verify public deployment
        shell: bash
        env:
          APPLICATION_URL: ${{ steps.stack.outputs.application_url }}
        run: |
          curl --fail --show-error --silent \
            --retry 20 --retry-delay 15 --retry-all-errors \
            "$APPLICATION_URL/health"
          echo
          echo "TrustShare is live at $APPLICATION_URL"

      - name: Deployment summary
        env:
          APPLICATION_URL: ${{ steps.stack.outputs.application_url }}
        run: |
          {
            echo "## AWS deployment"
            echo
            echo "- Application: $APPLICATION_URL"
            echo "- Health: $APPLICATION_URL/health"
            echo "- API documentation: $APPLICATION_URL/docs"
            echo "- Image commit: \`$GITHUB_SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"
