name: Group D deployment checks

on:
  pull_request:
    branches: [main-group-D]
  push:
    branches: [main-group-D, Abhishek/deployment-group-d]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project-root/server
    env:
      DATABASE_URL: sqlite:///./test.db
      SECRET_KEY: ci-only-secret
      MASTER_KEY: ci-only-master-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: project-root/server/requirements*.txt
      - run: pip install -r requirements-dev.txt
      - run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project-root/client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: project-root/client/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          # Create React App otherwise promotes the team's existing lint
          # warnings to build errors on GitHub-hosted runners.
          CI: "false"
