version: "3.9"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./app.db
    volumes:
      - .:/app
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ../client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
