services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trustshare
      POSTGRES_USER: trustshare
      POSTGRES_PASSWORD: trustshare-local-only
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustshare -d trustshare"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://trustshare:trustshare-local-only@database:5432/trustshare
      SECRET_KEY: local-compose-secret-change-before-production
      BACKEND_CORS_ORIGINS: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
      DATA_DIR: /app/data
    volumes:
      - .:/app
      - encrypted-data:/app/data
    depends_on:
      database:
        condition: service_healthy
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    volumes:
      - ../client:/app
    depends_on:
      - backend
    command: sh -c "npm ci && npm start"

volumes:
  postgres-data:
  encrypted-data:
