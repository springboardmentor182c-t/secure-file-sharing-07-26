AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  TrustShare Group D internship deployment: ECS Fargate, private RDS PostgreSQL,
  API Gateway HTTPS, ECR, Secrets Manager, and GitHub Actions OIDC.

Parameters:
  ProjectName:
    Type: String
    Default: trustshare-group-d-aws
    AllowedPattern: "^[a-z][a-z0-9-]{2,31}$"
  ContainerImageTag:
    Type: String
    Default: latest
    AllowedPattern: "^[A-Za-z0-9_.-]{1,128}$"
  DesiredCount:
    Type: Number
    Default: 0
    AllowedValues: [0, 1]
    Description: Use 0 for first creation; GitHub Actions starts the service after pushing the image.
  OriginVerifyHeaderValue:
    Type: String
    NoEcho: true
    MinLength: 32
    MaxLength: 128
    AllowedPattern: "^[A-Za-z0-9]+$"
    Description: Random API-Gateway-to-load-balancer verification value; never commit it.
  DatabaseInstanceClass:
    Type: String
    Default: db.t4g.micro
    AllowedValues: [db.t4g.micro, db.t3.micro]
  DatabaseAllocatedStorage:
    Type: Number
    Default: 20
    MinValue: 20
    MaxValue: 20
  GitHubOwner:
    Type: String
    Default: springboardmentor182c-t
  GitHubRepository:
    Type: String
    Default: secure-file-sharing-07-26
  AwsDeploymentBranch:
    Type: String
    Default: Group-D-feature/AWS-Deployment-Abhishek
  MainBranch:
    Type: String
    Default: main-group-D
  CreateGitHubOidcProvider:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Set false if this account already has GitHub's OIDC provider.

Conditions:
  ShouldCreateGitHubOidcProvider: !Equals [!Ref CreateGitHubOidcProvider, "true"]

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.40.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-vpc"
  InternetGateway:
    Type: AWS::EC2::InternetGateway
  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref Vpc
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.40.0.0/24
      MapPublicIpOnLaunch: true
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-public-a"
  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: 10.40.1.0/24
      MapPublicIpOnLaunch: true
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-public-b"
  DatabaseSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.40.10.0/24
      MapPublicIpOnLaunch: false
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-database-a"
  DatabaseSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: 10.40.11.0/24
      MapPublicIpOnLaunch: false
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-database-b"
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-public-routes"
  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
      RouteTableId: !Ref PublicRouteTable
  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetA
  PublicSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetB

  LoadBalancerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow API Gateway HTTP origin requests
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      VpcId: !Ref Vpc
  TaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow application traffic only from the load balancer
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref LoadBalancerSecurityGroup
      VpcId: !Ref Vpc
  DatabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow PostgreSQL only from the ECS application
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref TaskSecurityGroup
      VpcId: !Ref Vpc
  FileSystemSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow encrypted file storage only from the ECS application
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref TaskSecurityGroup
      VpcId: !Ref Vpc
  DatabaseSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private subnets for TrustShare PostgreSQL
      SubnetIds: [!Ref DatabaseSubnetA, !Ref DatabaseSubnetB]

  FileSystem:
    Type: AWS::EFS::FileSystem
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Encrypted: true
      FileSystemTags:
        - Key: Name
          Value: !Sub "${ProjectName}-encrypted-files"
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
  FileSystemAccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref FileSystem
      PosixUser:
        Gid: "1000"
        Uid: "1000"
      RootDirectory:
        CreationInfo:
          OwnerGid: "1000"
          OwnerUid: "1000"
          Permissions: "0750"
        Path: /trustshare
  FileSystemMountTargetA:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SecurityGroups: [!Ref FileSystemSecurityGroup]
      SubnetId: !Ref PublicSubnetA
  FileSystemMountTargetB:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SecurityGroups: [!Ref FileSystemSecurityGroup]
      SubnetId: !Ref PublicSubnetB

  DatabaseCredentials:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Description: !Sub "${ProjectName} PostgreSQL credentials"
      GenerateSecretString:
        ExcludePunctuation: true
        GenerateStringKey: password
        PasswordLength: 32
        SecretStringTemplate: '{"username":"trustshare"}'
  JwtSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Description: !Sub "${ProjectName} JWT signing secret"
      GenerateSecretString:
        ExcludePunctuation: true
        PasswordLength: 64
  MasterKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Description: !Sub "${ProjectName} encryption master key"
      GenerateSecretString:
        ExcludePunctuation: true
        PasswordLength: 64
  Database:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      AllocatedStorage: !Ref DatabaseAllocatedStorage
      BackupRetentionPeriod: 1
      DBInstanceClass: !Ref DatabaseInstanceClass
      DBName: trustshare
      DBSubnetGroupName: !Ref DatabaseSubnetGroup
      DeletionProtection: false
      Engine: postgres
      MasterUsername: !Sub "{{resolve:secretsmanager:${DatabaseCredentials}:SecretString:username}}"
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${DatabaseCredentials}:SecretString:password}}"
      MultiAZ: false
      PubliclyAccessible: false
      StorageEncrypted: true
      StorageType: gp3
      VPCSecurityGroups: [!Ref DatabaseSecurityGroup]

  EcrRepository:
    Type: AWS::ECR::Repository
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      EmptyOnDelete: true
      EncryptionConfiguration:
        EncryptionType: AES256
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: MUTABLE
      RepositoryName: !Ref ProjectName
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ProjectName
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
  ApplicationLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: !Sub "/ecs/${ProjectName}"
      RetentionInDays: 7
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-task-execution"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy"
      Policies:
        - PolicyName: ReadTrustShareSecrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [secretsmanager:GetSecretValue]
                Resource: [!Ref DatabaseCredentials, !Ref JwtSecret, !Ref MasterKeySecret]
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-task"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      SecurityGroups: [!Ref LoadBalancerSecurityGroup]
      Subnets: [!Ref PublicSubnetA, !Ref PublicSubnetB]
      Type: application
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      HealthCheckEnabled: true
      HealthCheckIntervalSeconds: 30
      HealthCheckPath: /health
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      Matcher:
        HttpCode: "200"
      Port: 8000
      Protocol: HTTP
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"
      TargetType: ip
      UnhealthyThresholdCount: 3
      VpcId: !Ref Vpc
  LoadBalancerListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            ContentType: text/plain
            MessageBody: Forbidden
            StatusCode: "403"
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Description: !Sub "${ProjectName} public HTTPS entry point"
      Name: !Sub "${ProjectName}-https"
      ProtocolType: HTTP
  HttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      Description: Protected HTTP proxy to the application load balancer
      IntegrationMethod: ANY
      IntegrationType: HTTP_PROXY
      IntegrationUri: !Sub "http://${LoadBalancer.DNSName}"
      PayloadFormatVersion: "1.0"
      RequestParameters:
        "overwrite:header.X-Origin-Verify": !Ref OriginVerifyHeaderValue
  HttpApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "$default"
      Target: !Join ["/", [integrations, !Ref HttpApiIntegration]]
  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    DependsOn: HttpApiRoute
    Properties:
      ApiId: !Ref HttpApi
      AutoDeploy: true
      StageName: "$default"
  LoadBalancerListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      Actions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup
      Conditions:
        - Field: http-header
          HttpHeaderConfig:
            HttpHeaderName: X-Origin-Verify
            Values: [!Ref OriginVerifyHeaderValue]
      ListenerArn: !Ref LoadBalancerListener
      Priority: 1

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Cpu: "256"
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      Family: !Ref ProjectName
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: trustshare
          Image: !Join
            - ":"
            - [!GetAtt EcrRepository.RepositoryUri, !Ref ContainerImageTag]
          Command:
            - sh
            - -c
            - >-
              export DATABASE_URL="postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require";
              exec uvicorn src.api:app --host 0.0.0.0 --port "${PORT:-8000}" --proxy-headers --forwarded-allow-ips="*"
          Environment:
            - Name: ENVIRONMENT
              Value: production
            - Name: PORT
              Value: "8000"
            - Name: DATA_DIR
              Value: /data
            - Name: DB_HOST
              Value: !GetAtt Database.Endpoint.Address
            - Name: DB_PORT
              Value: !GetAtt Database.Endpoint.Port
            - Name: DB_NAME
              Value: trustshare
            - Name: DB_USER
              Value: trustshare
            - Name: FRONTEND_URL
              Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}"
            - Name: BACKEND_URL
              Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}"
            - Name: BACKEND_CORS_ORIGINS
              Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}"
          Essential: true
          HealthCheck:
            Command:
              - CMD-SHELL
              - >-
                python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)" || exit 1
            Interval: 30
            Retries: 3
            StartPeriod: 60
            Timeout: 5
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ApplicationLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: trustshare
          MountPoints:
            - ContainerPath: /data
              ReadOnly: false
              SourceVolume: trustshare-data
          PortMappings:
            - ContainerPort: 8000
              Name: http
              Protocol: tcp
          Secrets:
            - Name: DB_PASSWORD
              ValueFrom: !Sub "${DatabaseCredentials}:password::"
            - Name: SECRET_KEY
              ValueFrom: !Ref JwtSecret
            - Name: MASTER_KEY
              ValueFrom: !Ref MasterKeySecret
      Volumes:
        - Name: trustshare-data
          EFSVolumeConfiguration:
            AuthorizationConfig:
              AccessPointId: !Ref FileSystemAccessPoint
              IAM: DISABLED
            FilesystemId: !Ref FileSystem
            RootDirectory: /
            TransitEncryption: ENABLED
  EcsService:
    Type: AWS::ECS::Service
    DependsOn: [LoadBalancerListenerRule]
    Properties:
      Cluster: !Ref EcsCluster
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 0
      DesiredCount: !Ref DesiredCount
      EnableECSManagedTags: true
      HealthCheckGracePeriodSeconds: 180
      LaunchType: FARGATE
      LoadBalancers:
        - ContainerName: trustshare
          ContainerPort: 8000
          TargetGroupArn: !Ref TargetGroup
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups: [!Ref TaskSecurityGroup]
          Subnets: [!Ref PublicSubnetA, !Ref PublicSubnetB]
      PlatformVersion: LATEST
      PropagateTags: SERVICE
      ServiceName: !Ref ProjectName
      TaskDefinition: !Ref TaskDefinition

  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateGitHubOidcProvider
    Properties:
      ClientIdList: [sts.amazonaws.com]
      Url: https://token.actions.githubusercontent.com
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-github-deploy"
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - ShouldCreateGitHubOidcProvider
                - !Ref GitHubOidcProvider
                - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub:
                  - !Sub "repo:${GitHubOwner}/${GitHubRepository}:ref:refs/heads/${AwsDeploymentBranch}"
                  - !Sub "repo:${GitHubOwner}/${GitHubRepository}:ref:refs/heads/${MainBranch}"
      Policies:
        - PolicyName: DeployTrustShareContainer
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: EcrLogin
                Effect: Allow
                Action: [ecr:GetAuthorizationToken]
                Resource: "*"
              - Sid: PushApplicationImage
                Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:CompleteLayerUpload
                  - ecr:GetDownloadUrlForLayer
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                  - ecr:UploadLayerPart
                Resource: !GetAtt EcrRepository.Arn
              - Sid: DeployEcsService
                Effect: Allow
                Action: [ecs:UpdateService]
                Resource: !GetAtt EcsService.ServiceArn
              - Sid: ObserveDeployment
                Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                  - ecs:DescribeServices
                  - ecs:DescribeTasks
                  - ecs:ListTasks
                Resource: "*"

Outputs:
  ApplicationUrl:
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}"
  HealthUrl:
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/health"
  ApiDocumentationUrl:
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/docs"
  EcrRepositoryUri:
    Value: !GetAtt EcrRepository.RepositoryUri
  EcsClusterName:
    Value: !Ref EcsCluster
  EcsServiceName:
    Value: !GetAtt EcsService.Name
  GitHubActionsRoleArn:
    Description: Add this as GitHub repository variable AWS_ROLE_ARN.
    Value: !GetAtt GitHubActionsRole.Arn
